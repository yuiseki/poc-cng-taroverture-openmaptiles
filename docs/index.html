<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>taroverture-merge-tile demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    body { margin: 0; }
    #map { position: absolute; inset: 0; }
    #panel {
      position: absolute; top: 10px; left: 10px; z-index: 1;
      background: rgba(255,255,255,.9); padding: 8px 12px; border-radius: 6px;
      font: 13px/1.6 sans-serif;
    }
  </style>
</head>
<body>
  <div id="panel">
    <strong>taroverture-merge-tile</strong><br />
    style:
    <label><input type="radio" name="mode" value="raw" /> raw</label>
    <label><input type="radio" name="mode" value="omt" checked /> omt</label>
    <label><input type="radio" name="mode" value="bright" /> bright</label>
    <label><input type="radio" name="mode" value="fiord" /> fiord</label>
  </div>
  <div id="map"></div>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script>
    // raw モード: Overture の全レイヤーを色分け表示するインスペクタ
    const RAW_LAYERS = {
      land: { type: "fill", color: "#e8e4d8", geom: "fill" },
      land_cover: { type: "fill", color: "#cfe3c0", geom: "fill" },
      land_use: { type: "fill", color: "#e0d8ef", geom: "fill" },
      water: { type: "fill", color: "#a8c8f0", geom: "fill" },
      bathymetry: { type: "fill", color: "#c8ddf5", geom: "fill" },
      division_area: { type: "fill", color: "#f5e8e8", geom: "fill" },
      building: { type: "fill", color: "#d9c2b0", geom: "fill" },
      building_part: { type: "fill", color: "#c4a890", geom: "fill" },
      infrastructure: { type: "line", color: "#888888", geom: "line" },
      segment: { type: "line", color: "#e08030", geom: "line" },
      division_boundary: { type: "line", color: "#b050b0", geom: "line" },
      division: { type: "circle", color: "#b050b0", geom: "point" },
      place: { type: "circle", color: "#3060d0", geom: "point" },
      connector: { type: "circle", color: "#e08030", geom: "point" },
      address: { type: "circle", color: "#30a060", geom: "point" },
    };

    function rawStyle(base) {
      const layers = [{ id: "bg", type: "background", paint: { "background-color": "#f8f8f8" } }];
      for (const [name, def] of Object.entries(RAW_LAYERS)) {
        const layer = { id: `raw-${name}`, source: "merged", "source-layer": name };
        if (def.type === "fill") {
          layer.type = "fill";
          layer.paint = { "fill-color": def.color, "fill-opacity": 0.6, "fill-outline-color": "#00000033" };
        } else if (def.type === "line") {
          layer.type = "line";
          layer.paint = { "line-color": def.color, "line-width": 1.2 };
        } else {
          layer.type = "circle";
          layer.paint = { "circle-color": def.color, "circle-radius": 2.5, "circle-opacity": 0.8 };
        }
        layers.push(layer);
      }
      return {
        version: 8,
        sources: { merged: { type: "vector", url: `${base}/tiles/raw/tile.json` } },
        layers,
      };
    }

    // omt モード: 変換済みレイヤーのみ表示 (building + transportation)
    const OMT_ROAD_COLORS = {
      motorway: "#e892a2",
      trunk: "#f9b29c",
      primary: "#fcd6a4",
      secondary: "#f7fabf",
      tertiary: "#ffffff",
      minor: "#ffffff",
      service: "#ffffff",
      path: "#fa8072",
      rail: "#707070",
      transit: "#4040a0",
    };

    function omtStyle(base) {
      return {
        version: 8,
        glyphs: "https://yuiseki.dev/static/fonts/{fontstack}/{range}.pbf",
        sources: { merged: { type: "vector", url: `${base}/tiles/omt/tile.json` } },
        layers: [
          { id: "bg", type: "background", paint: { "background-color": "#f8f4f0" } },
          {
            id: "landcover",
            type: "fill",
            source: "merged",
            "source-layer": "landcover",
            paint: {
              "fill-color": [
                "match", ["get", "class"],
                "wood", "#bcdca5",
                "grass", "#d8e8c8",
                "farmland", "#eef0d5",
                "sand", "#f5e9c6",
                "wetland", "#cce8d8",
                "ice", "#e8f4f8",
                "rock", "#d8d0c8",
                "#e0e0d8",
              ],
              "fill-opacity": 0.7,
            },
          },
          {
            id: "landuse",
            type: "fill",
            source: "merged",
            "source-layer": "landuse",
            paint: {
              "fill-color": [
                "match", ["get", "class"],
                "residential", "#e8e0d8",
                "commercial", "#f2dede",
                "retail", "#f2dede",
                "industrial", "#e0d8e8",
                "cemetery", "#cce0c8",
                "school", "#f0e8d8",
                "university", "#f0e8d8",
                "college", "#f0e8d8",
                "kindergarten", "#f0e8d8",
                "hospital", "#fde8e8",
                "stadium", "#d8e8d0",
                "pitch", "#cee2c2",
                "playground", "#dceacc",
                "railway", "#e4e0e4",
                "#ece8e0",
              ],
              "fill-opacity": 0.6,
            },
          },
          {
            id: "park",
            type: "fill",
            source: "merged",
            "source-layer": "park",
            paint: { "fill-color": "#c8e0a8", "fill-opacity": 0.7 },
          },
          {
            id: "water",
            type: "fill",
            source: "merged",
            "source-layer": "water",
            paint: { "fill-color": "#a8c8f0" },
          },
          {
            id: "transportation-casing",
            type: "line",
            source: "merged",
            "source-layer": "transportation",
            filter: ["!", ["in", ["get", "class"], ["literal", ["path", "rail", "transit"]]]],
            paint: { "line-color": "#b0b0b0", "line-width": 4 },
          },
          {
            id: "transportation-road",
            type: "line",
            source: "merged",
            "source-layer": "transportation",
            filter: ["!", ["in", ["get", "class"], ["literal", ["path", "rail", "transit"]]]],
            paint: {
              "line-color": [
                "coalesce",
                ["get", ["get", "class"], ["literal", OMT_ROAD_COLORS]],
                "#cccccc",
              ],
              "line-width": [
                "match", ["get", "class"],
                "motorway", 4, "trunk", 3.5, "primary", 3, "secondary", 2.5,
                2,
              ],
            },
          },
          {
            id: "transportation-path",
            type: "line",
            source: "merged",
            "source-layer": "transportation",
            filter: ["==", ["get", "class"], "path"],
            paint: {
              "line-color": OMT_ROAD_COLORS.path,
              "line-width": 1,
              "line-dasharray": [2, 2],
            },
          },
          {
            id: "transportation-rail",
            type: "line",
            source: "merged",
            "source-layer": "transportation",
            filter: ["in", ["get", "class"], ["literal", ["rail", "transit"]]],
            paint: {
              "line-color": [
                "match", ["get", "class"],
                "transit", OMT_ROAD_COLORS.transit,
                OMT_ROAD_COLORS.rail,
              ],
              "line-width": 1.5,
              "line-dasharray": [4, 2],
            },
          },
          {
            id: "building-3d",
            type: "fill-extrusion",
            source: "merged",
            "source-layer": "building",
            paint: {
              "fill-extrusion-color": "#d9c2b0",
              "fill-extrusion-height": ["get", "render_height"],
              "fill-extrusion-base": ["get", "render_min_height"],
              "fill-extrusion-opacity": 0.85,
            },
          },
          {
            id: "boundary",
            type: "line",
            source: "merged",
            "source-layer": "boundary",
            filter: ["==", ["get", "maritime"], 0],
            paint: {
              "line-color": "#9e6aae",
              "line-width": ["match", ["get", "admin_level"], 2, 2.5, 4, 1.8, 1],
              "line-dasharray": [3, 2],
            },
          },
          {
            id: "road-name",
            type: "symbol",
            source: "merged",
            "source-layer": "transportation_name",
            layout: {
              "symbol-placement": "line",
              "text-field": ["get", "name"],
              "text-font": ["Noto Sans CJK JP Regular"],
              "text-size": 11,
            },
            paint: {
              "text-color": "#555555",
              "text-halo-color": "#ffffff",
              "text-halo-width": 1.5,
            },
          },
          {
            id: "poi-label",
            type: "symbol",
            source: "merged",
            "source-layer": "poi",
            minzoom: 14,
            filter: ["<=", ["get", "rank"], 10],
            layout: {
              "text-field": ["get", "name"],
              "text-font": ["Noto Sans CJK JP Regular"],
              "text-size": 10,
              "text-max-width": 8,
            },
            paint: {
              "text-color": [
                "match", ["get", "class"],
                "railway", "#1a5fb4",
                "restaurant", "#b5651d", "cafe", "#b5651d", "bar", "#b5651d", "fast_food", "#b5651d",
                "#5a7a5a",
              ],
              "text-halo-color": "#ffffff",
              "text-halo-width": 1.2,
            },
          },
          {
            id: "place-label",
            type: "symbol",
            source: "merged",
            "source-layer": "place",
            layout: {
              "text-field": ["get", "name"],
              "text-font": ["Noto Sans CJK JP Regular"],
              "text-size": [
                "match", ["get", "class"],
                "country", 18, "state", 16, "province", 15, "city", 14, "town", 13,
                11,
              ],
            },
            paint: {
              "text-color": "#444444",
              "text-halo-color": "#ffffff",
              "text-halo-width": 1.5,
            },
          },
        ],
      };
    }

    const base = location.origin;
    const map = new maplibregl.Map({
      container: "map",
      style: omtStyle(base),
      center: [139.767, 35.681], // 東京駅
      zoom: 14,
      pitch: 0,
      hash: true,
    });
    map.addControl(new maplibregl.NavigationControl());

    map.on("click", (e) => {
      const features = map.queryRenderedFeatures(e.point);
      if (!features.length) return;
      const f = features[0];
      new maplibregl.Popup()
        .setLngLat(e.lngLat)
        .setHTML(`<strong>${f.layer["source-layer"]}</strong><pre style="max-height:200px;overflow:auto">${JSON.stringify(f.properties, null, 1)}</pre>`)
        .addTo(map);
    });

    // bright / fiord はサーバ側で sources.openmaptiles.url をパッチ済みの
    // スタイル JSON (/styles/:name) をそのまま読み込む
    const STYLES = {
      raw: () => rawStyle(base),
      omt: () => omtStyle(base),
      bright: () => `${base}/styles/osm-bright`,
      fiord: () => `${base}/styles/osm-fiord`,
    };

    document.querySelectorAll('input[name="mode"]').forEach((el) => {
      el.addEventListener("change", () => {
        map.setStyle(STYLES[el.value]());
      });
    });
  </script>
</body>
</html>
