# ローカル (docker-desktop) 用。ローカルでビルドしたイメージをそのまま使う:
#   docker build -t dev.local/poc-cng-taroverture-openmaptiles:0.1.1 .
#   kubectl apply -f k8s/namespace.yaml -f k8s/ksvc.yaml
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: taroverture-openmaptiles
  namespace: knative-pool
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "0"
        autoscaling.knative.dev/max-scale: "3"
        autoscaling.knative.dev/target: "10"
        # 初回リクエストは PMTiles の header/directory fetch で数秒かかるため、
        # ウォーム済み pod (ディレクトリキャッシュ・タイル LRU 保持) を残す
        autoscaling.knative.dev/scale-down-delay: "60s"
    spec:
      containerConcurrency: 10
      timeoutSeconds: 120
      containers:
        - image: dev.local/poc-cng-taroverture-openmaptiles:0.1.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
