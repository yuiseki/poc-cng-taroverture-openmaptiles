# z クラスタ (yuisekin-z, x86_64 単一ノード) 用。
# イメージは z 上で docker build して containerd (k8s.io namespace) に import する:
#   docker build -t taroverture-openmaptiles:0.1.0 .
#   docker save taroverture-openmaptiles:0.1.0 | sudo ctr -n k8s.io images import -
#   kubectl apply -f k8s/z/ksvc.yaml
# 素のイメージ名は docker.io 扱いになり、config-deployment の
# registries-skipping-tag-resolving (docker.io) で digest 解決がスキップされる。
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: taroverture-openmaptiles
  namespace: knative-pool
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "0"
        autoscaling.knative.dev/max-scale: "3"
        autoscaling.knative.dev/target: "10"
        # 初回リクエストは PMTiles の header/directory fetch で数秒かかるため、
        # ウォーム済み pod (ディレクトリキャッシュ・タイル LRU 保持) を残す
        autoscaling.knative.dev/scale-down-delay: "60s"
    spec:
      containerConcurrency: 10
      timeoutSeconds: 120
      containers:
        - image: taroverture-openmaptiles:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
